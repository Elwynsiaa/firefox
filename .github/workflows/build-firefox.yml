name: Build Firefox Windows Installer

# Trigger the build manually from the GitHub Actions tab
on:
  workflow_dispatch: 

jobs:
  build:
    # We highly recommend using a self-hosted or larger runner here
    runs-on: windows-latest 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Install MozillaBuild
        run: |
          # Download the latest MozillaBuild installer
          Invoke-WebRequest -Uri "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe" -OutFile MozillaBuildSetup.exe
          
          # Install silently (/S) to the default directory (C:\mozilla-build)
          Start-Process -FilePath .\MozillaBuildSetup.exe -ArgumentList "/S" -Wait

      - name: Create mozconfig
        run: |
          # The mozconfig file tells the build system how to configure your build
          echo "ac_add_options --enable-application=browser" > mozconfig
          echo "ac_add_options --enable-optimize" >> mozconfig
          echo "ac_add_options --disable-debug" >> mozconfig
          # Enable the creation of the installer/updater package
          echo "ac_add_options --enable-update-packaging" >> mozconfig

      - name: Bootstrap Environment
        shell: cmd
        run: |
          REM Use MozillaBuild's shell to run the bootstrap process.
          REM --application-choice=browser and --no-interactive ensure it doesn't pause for user input.
          C:\mozilla-build\start-shell.bat -c "./mach bootstrap --application-choice=browser --no-interactive"

      - name: Build Firefox
        shell: cmd
        run: |
          REM This step compiles the browser and will take a significant amount of time
          C:\mozilla-build\start-shell.bat -c "./mach build"

      - name: Package Installer
        shell: cmd
        run: |
          REM This step bundles the compiled binaries into a Windows .exe installer
          C:\mozilla-build\start-shell.bat -c "./mach installer"

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-firefox-installer
          # The resulting installer is typically dropped in the obj-dir under dist/install/sea/
          path: obj-*/dist/install/sea/*.exe