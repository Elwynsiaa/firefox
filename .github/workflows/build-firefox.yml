name: Build Firefox Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Standard GitHub Windows runners have a lot of pre-installed SDKs that eat up disk space. 
      # We delete some massive unused ones to make room for the massive Firefox build.
      - name: Free Up Disk Space
        shell: bash
        run: |
          rm -rf "C:/Program Files/Android"
          rm -rf "C:/ProgramData/Microsoft/AndroidNDK"
          rm -rf "C:/Program Files/dotnet"

      - name: Download and Install MozillaBuild
        run: |
          Invoke-WebRequest -Uri "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe" -OutFile MozillaBuildSetup.exe
          Start-Process -FilePath .\MozillaBuildSetup.exe -ArgumentList "/S" -Wait

      - name: Create mozconfig
        run: |
          echo ac_add_options --enable-application=browser > mozconfig
          echo ac_add_options --enable-optimize >> mozconfig
          echo ac_add_options --disable-debug >> mozconfig
          echo ac_add_options --enable-update-packaging >> mozconfig

      - name: Bootstrap Environment
        shell: cmd
        # Added -no-start -defterm to prevent it from detaching
        run: |
          C:\mozilla-build\start-shell.bat -no-start -defterm -c "./mach bootstrap --application-choice=browser --no-interactive"

      - name: Build Firefox
        shell: cmd
        # This is where the magic happens. Expect this step to take 2+ hours!
        run: |
          C:\mozilla-build\start-shell.bat -no-start -defterm -c "./mach build"

      - name: Package Installer
        shell: cmd
        run: |
          C:\mozilla-build\start-shell.bat -no-start -defterm -c "./mach installer"

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-firefox-installer
          path: obj-*/dist/install/sea/*.exe
