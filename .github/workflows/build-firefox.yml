name: Build Firefox Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Up Disk Space
        shell: bash
        run: |
          rm -rf "C:/Program Files/Android"
          rm -rf "C:/ProgramData/Microsoft/AndroidNDK"
          rm -rf "C:/Program Files/dotnet"

      - name: Download and Install MozillaBuild
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe" -OutFile MozillaBuildSetup.exe
          Start-Process -FilePath .\MozillaBuildSetup.exe -ArgumentList "/S" -Wait

      - name: Create mozconfig
        shell: bash
        run: |
          echo "ac_add_options --enable-application=browser" > mozconfig
          echo "ac_add_options --enable-optimize" >> mozconfig
          echo "ac_add_options --disable-debug" >> mozconfig
          echo "ac_add_options --enable-update-packaging" >> mozconfig

      - name: Bootstrap Environment
        shell: cmd
        env:
          MOZ_AUTOMATION: 1
          MOZILLABUILD: C:\mozilla-build
          MSYSTEM: MINGW64
        # We invoke bash, and pass the critical --no-system-changes flag to prevent UAC hangs!
        run: |
          C:\mozilla-build\msys2\usr\bin\bash.exe --login -c "export PATH=$PATH:/c/Progra~1/Git/cmd:/c/Progra~1/Git/bin && cd '%GITHUB_WORKSPACE:\=/%' && ./mach --no-interactive bootstrap --application-choice=browser --no-system-changes"

      - name: Build Firefox
        shell: cmd
        env:
          MOZ_AUTOMATION: 1
          MOZILLABUILD: C:\mozilla-build
          MSYSTEM: MINGW64
        run: |
          C:\mozilla-build\msys2\usr\bin\bash.exe --login -c "export PATH=$PATH:/c/Progra~1/Git/cmd:/c/Progra~1/Git/bin && cd '%GITHUB_WORKSPACE:\=/%' && ./mach build"

      - name: Package Installer
        shell: cmd
        env:
          MOZ_AUTOMATION: 1
          MOZILLABUILD: C:\mozilla-build
          MSYSTEM: MINGW64
        run: |
          C:\mozilla-build\msys2\usr\bin\bash.exe --login -c "export PATH=$PATH:/c/Progra~1/Git/cmd:/c/Progra~1/Git/bin && cd '%GITHUB_WORKSPACE:\=/%' && ./mach installer"

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-firefox-installer
          path: obj-*/dist/install/sea/*.exe
